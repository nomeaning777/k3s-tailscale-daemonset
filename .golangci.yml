version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - gocritic
    - revive
    - misspell
    - unconvert
    - prealloc
    - nakedret
    - gocyclo
    - dupl
    - gocognit
    - funlen
    - lll
    - godox
    - gochecknoinits
    - whitespace
    - goprintffuncname
    - mnd
    - err113
    - goconst
    - godot
    - nestif
    - nolintlint
    - copyloopvar
    - exhaustive
    - sqlclosecheck
    - noctx
    - bodyclose

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable:
        - shadow
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
    lll:
      line-length: 120
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
    funlen:
      lines: 60
      statements: 40
    godot:
      capital: true
    nestif:
      min-complexity: 4

  exclusions:
    paths:
      - vendor
      - .git
      - .github
    rules:
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - gocognit
          - goconst
      - linters:
          - lll
        source: "^//go:generate "